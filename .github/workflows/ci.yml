name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt jsonschema ruff

      - name: Schema smoke check
        run: |
          python - << 'PY'
          import json
          from pathlib import Path
          p = Path('shared/schemas/pipeline.v1.json')
          data = json.loads(p.read_text())
          assert data.get('title') == 'Solaris Pipeline v1'
          print('Schema smoke check passed')
          PY

      - name: Lint (critical rules)
        run: ruff check . --select E9,F63,F7,F82

      - name: VLM contract smoke
        run: python3 scripts/validate_vlm_contract.py

      - name: Golden-path smoke
        run: python3 scripts/smoke_test.py

      - name: Run tests (includes degraded-path)
        run: pytest -q

      - name: Optional Postgres E2E
        env:
          SOLARIS_STORE: ${{ secrets.DATABASE_URL != '' && 'postgres' || 'sqlite' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 scripts/postgres_e2e.py

  ui-screenshot-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Require screenshot when apps/web changed
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const touchedUI = files.some(f => f.filename.startsWith('apps/web/'));
            if (!touchedUI) {
              core.info('No UI files changed.');
              return;
            }
            const body = (pr.body || '').toLowerCase();
            const hasEvidence = body.includes('screenshot attached') || body.includes('![') || body.includes('<img');
            if (!hasEvidence) {
              core.setFailed('UI files changed but no screenshot evidence found in PR body.');
            }
