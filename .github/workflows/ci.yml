name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      require_postgres_e2e:
        description: "Require Postgres E2E check (fails if DATABASE_URL secret missing)"
        required: false
        default: "false"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt jsonschema ruff

      - name: Schema smoke check
        run: |
          python - << 'PY'
          import json
          from pathlib import Path
          p = Path('shared/schemas/pipeline.v1.json')
          data = json.loads(p.read_text())
          assert data.get('title') == 'Solaris Pipeline v1'
          print('Schema smoke check passed')
          PY

      - name: Lint (critical rules)
        run: ruff check . --select E9,F63,F7,F82

      - name: VLM contract smoke
        run: python3 scripts/validate_vlm_contract.py

      - name: Golden-path smoke
        run: python3 scripts/smoke_test.py

      - name: Run tests (includes degraded-path)
        run: pytest -q

      - name: Postgres connectivity debug (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Postgres debug: DATABASE_URL missing"
            exit 0
          fi
          python3 - << 'PY'
          import os
          import psycopg

          dsn = os.environ.get('DATABASE_URL', '')
          try:
              with psycopg.connect(dsn, connect_timeout=10) as conn:
                  with conn.cursor() as cur:
                      cur.execute('select 1')
                      row = cur.fetchone()
              print({'postgres_debug_ok': True, 'select_1': row[0] if row else None})
          except Exception as exc:
              msg = str(exc)
              msg = msg.replace(dsn, '<redacted-dsn>')
              print({'postgres_debug_ok': False, 'error_type': type(exc).__name__, 'error': msg[:500]})
              raise
          PY

      - name: Postgres E2E (strict when configured)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REQUIRE_POSTGRES_INPUT: ${{ github.event.inputs.require_postgres_e2e || 'false' }}
        run: |
          if [ ! -f scripts/postgres_e2e.py ]; then
            echo "Skipping Postgres E2E (script not present on this branch)."
            exit 0
          fi

          if [ -n "$DATABASE_URL" ]; then
            echo "Running Postgres E2E with DATABASE_URL secret."
            SOLARIS_STORE=postgres DATABASE_URL="$DATABASE_URL" python3 scripts/postgres_e2e.py --require
            exit $?
          fi

          if [ "$REQUIRE_POSTGRES_INPUT" = "true" ]; then
            echo "DATABASE_URL secret is required but missing."
            exit 1
          fi

          echo "Skipping Postgres E2E: DATABASE_URL secret not configured."

  ui-screenshot-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Require screenshot when apps/web changed
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const touchedUI = files.some(f => f.filename.startsWith('apps/web/'));
            if (!touchedUI) {
              core.info('No UI files changed.');
              return;
            }
            const body = (pr.body || '').toLowerCase();
            const hasEvidence = body.includes('screenshot attached') || body.includes('![') || body.includes('<img');
            if (!hasEvidence) {
              core.setFailed('UI files changed but no screenshot evidence found in PR body.');
            }
